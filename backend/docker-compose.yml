version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: foresight_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: foresight
      MYSQL_USER: foresight_user
      MYSQL_PASSWORD: foresight_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db_data: