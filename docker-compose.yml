version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: foresight-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: foresight
      MYSQL_USER: foresight_user
      MYSQL_PASSWORD: foresight_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:

